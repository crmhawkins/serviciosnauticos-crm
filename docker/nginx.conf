user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    server_tokens      off;
    keepalive_timeout  65;
    client_max_body_size 64m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml text/javascript image/svg+xml;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    upstream php-fpm {
        server 127.0.0.1:9000;
    }

    server {
        listen 8080 default_server;
        listen [::]:8080 default_server;
        server_name _;

        root /var/www/html/public;
        index index.php index.html;

        # Block direct access to signing certificate and signed invoices
        location ~* \.(pfx|p12|key|pem|crt|xsig|env)$ {
            deny all;
            return 404;
        }

        # Block dotfiles
        location ~ /\.(?!well-known) {
            deny all;
            return 404;
        }

        # Laravel storage/uploads pass-through
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Static assets: long cache
        location ~* \.(?:css|js|woff2?|ttf|eot|ico|png|jpe?g|gif|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_param DOCUMENT_ROOT $realpath_root;
            fastcgi_buffers 16 32k;
            fastcgi_buffer_size 64k;
            fastcgi_read_timeout 300;
        }
    }
}
